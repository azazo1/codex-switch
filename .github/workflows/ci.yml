name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: 构建 ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            id: linux-x64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            platform: linux
            artifact: codex-switch-linux-x64.tar.gz
          - name: Linux arm64
            id: linux-arm64
            runner: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux
            artifact: codex-switch-linux-arm64.tar.gz
          - name: Windows x64
            id: windows-x64
            runner: windows-2025
            target: x86_64-pc-windows-msvc
            platform: windows
            artifact: codex-switch-windows-x64.zip
          - name: Windows arm64
            id: windows-arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            platform: windows
            artifact: codex-switch-windows-arm64.zip
          - name: macOS x64
            id: macos-x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            platform: macos
            artifact: codex-switch-macos-x64.dmg
          - name: macOS arm64
            id: macos-arm64
            runner: macos-15
            target: aarch64-apple-darwin
            platform: macos
            artifact: codex-switch-macos-arm64.dmg

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Linux 依赖
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libwayland-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxdo-dev \
            libxkbcommon-dev \
            pkg-config

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 缓存 Rust 构建
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: 构建 release 二进制文件
        run: cargo build --locked --release --bins --target ${{ matrix.target }}

      - name: 打包 Linux 产物
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          mkdir -p dist
          tar -C "target/${{ matrix.target }}/release" \
            -czf "dist/${{ matrix.artifact }}" codex-switch

      - name: 打包 Windows 产物
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive `
            -LiteralPath "target/${{ matrix.target }}/release/codex-switch.exe" `
            -DestinationPath "dist/${{ matrix.artifact }}"

      - name: 打包 macOS DMG
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          bash scripts/package-macos.sh \
            "target/${{ matrix.target }}/release" \
            "dist/${{ matrix.artifact }}"

      - name: 上传 release 产物
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.id }}
          path: dist/${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: 创建 GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码和 tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 下载 release 产物
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: 读取 tag 正文
        env:
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          git show-ref --verify --quiet "refs/tags/$TAG_NAME"
          git tag --list \
            --format='%(contents:subject)%0a%0a%(contents:body)' \
            -- "$TAG_NAME" > release-notes.md

      - name: 创建或更新 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(release-artifacts/*)
          if (( ${#assets[@]} == 0 )); then
            echo "没有可发布的构建产物" >&2
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --title "$TAG_NAME" \
              --notes-file release-notes.md
            gh release upload "$TAG_NAME" "${assets[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${assets[@]}" \
              --verify-tag \
              --title "$TAG_NAME" \
              --notes-file release-notes.md
          fi
